name: build

# Compiles the .ipk on top of the pre-baked daypass-sdk image (see sdk-image.yml
# / docker/Dockerfile.sdk). Because the SDK, feeds and toolchain are already in
# the base image, this is fast. Runs on release tags or on demand — not on every
# push (fixes go to the device directly; .ipk are a release artifact).
on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # attach .ipk to a Release on tags
  packages: read     # pull the baked SDK image from GHCR

jobs:
  packages:
    name: aarch64_cortex-a53 · openwrt-24.10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile packages (pre-baked SDK)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.build
          build-args: |
            SDK_IMAGE=ghcr.io/${{ steps.vars.outputs.owner }}/daypass-sdk:openwrt-24.10
          load: true
          tags: daypass:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract .ipk from the built image
        run: |
          docker create --name c daypass:ci
          docker cp c:/builder/bin/packages ./binpkgs
          docker rm c
          mkdir -p dist
          for pat in 'mihomo_*' 'daypass_*' 'luci-app-daypass_*' 'luci-i18n-daypass-*'; do
            find ./binpkgs -name "$pat.ipk" -exec cp {} dist/ \;
          done
          echo "Artifacts:"; ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: daypass-aarch64_cortex-a53-openwrt-24.10
          path: dist/*.ipk
          if-no-files-found: error
          retention-days: 14

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.ipk
